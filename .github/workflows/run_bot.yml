
name: Daily Myfxbook Sentiment Logger

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-logger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # ✅ Add this

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run tracking script
        env:
          MYFXBOOK_EMAIL: ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}
        run: python script.py

      - name: Save files back to GitHub
        run: |
          git config --global user.name "Sentiment Bot"
          git config --global user.email "actions@github.com"
          git add *.csv
          git commit -m "Automated daily CSV sentiment update" || exit 0
          git push origin main  # ✅ Remove the git checkout main line
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # ✅ Add this
