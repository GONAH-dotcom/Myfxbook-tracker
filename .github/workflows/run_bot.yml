name: Daily Myfxbook Sentiment Logger

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-logger:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository files
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run tracking script
      env:
        MYFXBOOK_EMAIL: ${{ secrets.MYFXBOOK_EMAIL }}
        MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}
      run: python script.py

    - name: Commit and push updated CSV file back to storage
      run: |
        git config --global user.name "Sentiment Bot"
        git config --global user.email "bot@github.com"
        git add myfxbook_sentiment_history.csv
        git diff-index --quiet HEAD || git commit -m "Automated update: Added daily sentiment logs [skip ci]"
        git push
