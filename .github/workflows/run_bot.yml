name: Daily Myfxbook Sentiment Logger

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:

jobs:
  run-logger:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python environment
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run tracking script
        env:
          MYFXBOOK_EMAIL: ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}
        run: python script.py

      - name: Save files back to GitHub
        run: |
          git config --global user.name "Sentiment Bot"
          git config --global user.email "actions@github.com"
          git add *.csv || true
          git diff --cached --quiet || git commit -m "Automated daily CSV sentiment update"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
